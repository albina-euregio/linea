<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://leeoniya.github.io/uPlot/src/uPlot.css">
    <style>
       body {
    font-family: Helvetica, sans-serif;
    margin: 0;
    background-color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;  
    gap: 10px;
}

.controls {
    margin-top: 10px;
    text-align: center;
}

.custom-title-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 4px;
    width: 100%;
}

.custom-title {
    background-color: #ffffff;
    color: #555555;
    border: 2px solid #19aaff;
    border-radius: 40px;
    cursor: pointer;
    font-size: 14px;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 400;
    transition: background-color 0.3s ease, color 0.3s ease;

    display: flex;
    align-items: center;
    justify-content: center;

    padding: 0px 0px;
    height: 40px;
    min-width: 200px;
}

.toggle-btn {
    padding: 10px 20px;
    background-color: #ffffff;
    color: #555555;
    border: 2px solid #19aaff;
    border-radius: 40px;
    cursor: pointer;
    font-size: 14px;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 300;
    transition: background-color 0.3s ease, color 0.3s ease;
}

.toggle-btn:hover {
    background-color: #19aaff;
    color: white;
}

.toggle-btn:active {
    transform: translateY(1px);
}

#plot-container {
    display: flex;
    flex-direction: column;
    align-items: center;    /* center all plot divs */
    gap: 20px;
    width: 100%;
}

#plot-container > div {
    background-color: white;
    outline: 1.5px solid #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px;
    width: fit-content;     /* shrink to fit content */
    max-width: 100%;
}
    </style>
</head>

    <script>
        const timestamp = [1727733600, 1727734200, 1727734800, 1727735400, 1727736000, 1727736600, 1727737200];
        const TA = [-4, -13, -12.8, -3.7, -12.8, -12.8, -12.8];
        const RH = [89, 90, 91, 92, 93, 94, 95];
        const TSS = [-0.8, -2.1, -15.4, -0.3, -15.2, -15.2, -15.1];
        const VW = [6.9, 6.5, 5.8, 5.1, 4.3, 3.5, 3.7];
        const VWG = [29.2, 29.9, null, 24.5, 18.7, 15.5];
        const DW = [186, 186, 180, 176, 180, 156, 119];
        const HS = [43, 44, 45, 46, 46, 45, 47];
        const PSUM = [1, 1.2, 0.1, 0.1, 0.2, 0.3, 0.2];
        const GR = [320, 320, 322, 340, 350, 351, 352];
        
        // Formula for TD (Magnus)
        const dewPoint = (tempC, RH) => {
            const a = 17.27;
            const b = 237.7;
            const alpha = ((a * tempC) / (b + tempC)) + Math.log(RH / 100);
            return (b * alpha) / (a - alpha);
        };
        
        // Calculate TD array
        const TD = TA.map((temp, i) => dewPoint(temp, RH[i]));
        
        // Create the data arrays for each chart
        let data_TA_TD_TSS = [timestamp, TA, TD, TSS];
        let data_VW_VWG_DW = [timestamp, VW, VWG, DW];
        let data_HS_PSUM = [timestamp, HS, PSUM];
        let data_RH_GR = [timestamp, RH, GR];
        
        // Create state variable to control shading
        let showShadedAreas = true;
        
        // Create a single sync instance for all charts
        const syncCursor = uPlot.sync("weather-charts");
        
        // Define shared cursor options for all charts
        const cursorOpts = {
            lock: false,
            focus: {
                prox: -1,
            },
            sync: {
                key: syncCursor.key,
                setSeries: false,
                match: [(own, ext) => own == ext, (own, ext) => own == ext]
            },
            points: {
                size: 5,
                width: 2
            },
            drag: {
                setScale: true,
                x: true,
                y: false,
                dist: 0,
                uni: null,
                click: (self, e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    e.stopImmediatePropagation();
                },
            },
            snap: true,
            showTime: true
        };
        
       // uPlot options for Temperature, Dew Point & Snow Surface Temperature
        const opts_TA_TD_TSS = {
            width: 1040,
            height: 300,
            padding: [50, 50, 0, 50],
            cursor: cursorOpts,
            legend: {
                show: true,
                live: false,
                fill: (u, seriesIdx) => u.series[seriesIdx].stroke(u, seriesIdx),
                markers: {
                    fill: (u, seriesIdx) => u.series[seriesIdx].stroke(u, seriesIdx),
                    values: (u, seriesIdx, values) => {
                        let result = {};
                        u.series.forEach((s, i) => {
                            if (i === 0) {
                                result[s.label || s.name] = values[i];
                            } else {
                                result[s.label] = values[i] + (s.unit ? ` ${s.unit}` : "");
                            }
                        });
                        return result;
                    }
                }
            },
            
            hooks: {
                drawAxes: [
                    (u) => {
                        const ctx = u.ctx;
                        ctx.save();
                        ctx.font = "bold 0.9vm sans-serif";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "bottom";
                        
                        const plotWidth = u.bbox.width;
                        const canvasWidth = u.ctx.canvas.width;
                        const canvasHeight = u.ctx.canvas.height;
                        const yPos = canvasHeight * 0.05;
                        
                        // Horizontal label for y-axis
                        const xPosY = canvasWidth * 0.10;
                        ctx.fillStyle = "#DE2D26";
                        ctx.fillText("Temperatur (°C)", xPosY, yPos);
                        
                        // Horizontal label for y2-axis
                        const xPosY2 = canvasWidth * 0.9;
                        ctx.fillStyle = "#6aafd5";
                        ctx.fillText("Taupunkt (°C)", xPosY2, yPos);
                        
                        // Draw reference line at 0°C
                        const width = 1;
                        const offset = (width % 2) / 2;
                        const x0 = u.bbox.left;
                        const y0 = u.valToPos(0, "y", true);
                        const x1 = u.bbox.left + u.bbox.width;
                        
                        ctx.strokeStyle = "#000";
                        ctx.setLineDash([5, 5]);
                        ctx.lineWidth = width;
                        ctx.beginPath();
                        ctx.moveTo(x0 + offset, y0 + offset);
                        ctx.lineTo(x1 + offset, y0 + offset);
                        ctx.stroke();
                        ctx.setLineDash([]);
                        
                        ctx.restore();
                        
                        // Only draw shaded regions if showShadedAreas is true
                        if (showShadedAreas) {
                            ctx.save();
                            ctx.rect(u.bbox.left, u.bbox.top, u.bbox.width, u.bbox.height);
                            ctx.clip();
                            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
                            
                            let from = 0, to = 0;
                            
                            for (let i = 0; i < u.data[0].length; i++) {
                                let td = u.data[2][i];
                                let tss = u.data[3][i];
                                
                                if (td < 0 && tss < td) {
                                    let xVal = u.data[0][i];
                                    if (from === 0) from = xVal;
                                    to = xVal;
                                } else if (from !== 0) {
                                    let x0 = u.valToPos(from, "x", true);
                                    let x1 = u.valToPos(to, "x", true);
                                    ctx.fillRect(x0, u.bbox.top, x1 - x0, u.bbox.height);
                                    from = 0;
                                }
                            }
                            
                            // If region extends to end
                            if (from !== 0) {
                                let x0 = u.valToPos(from, "x", true);
                                let x1 = u.valToPos(to, "x", true);
                                ctx.fillRect(x0, u.bbox.top, x1 - x0, u.bbox.height);
                            }
                            
                            ctx.restore();
                        }
                    }
                ]
            },
            
scales: {

        ? ["", "-30", "-20", "-10", "0", "10", "20", ""]

    }
  }

        {
          scale: 'y',
          splits: [0, 25, 50, 75, 100],
          stroke: "#6aafd5",
          grid: {
            show: false,
          }
        },
        {
          scale: 'y2',
          splits: [0, 300, 600, 900, 1200],
          stroke: "#DE2D26",
          side: 1,
          grid: {
            show: true,
          }
        }
      ],
      series: [
         {
            name: "Time",
            value: "{DD}. {MMM}. {YYYY} {HH}:{mm}"
         },
        {
          label: "Relative Luftfeuchtigkeit",
          stroke: "#6aafd5",
          scale: "y",
          width: 2,
          value: (u, v) => v != null ? v.toFixed(1) + " %" : "-"
        },
        {
          label: "Globalstrahlung",
          unit: "W/m²",
          stroke: "#DE2D26",
          fill: "rgba(255,0,0,0.1)",
          scale: "y2",
          width: 1,
          value: (u, v) => v != null ? v.toFixed(1) + " W/m²" : "-"
        }
      ]
    };
        
        // Store chart instances
        let charts = {};

        // Create and mount all charts
        function initializeCharts() {
            try {
                charts.TA_TD_TSS = new uPlot(opts_TA_TD_TSS, data_TA_TD_TSS, document.getElementById("plot_TA_TD_TSS"));
                charts.VW_VWG_DW = new uPlot(opts_VW_VWG_DW, data_VW_VWG_DW, document.getElementById("plot_VW_VWG_DW"));
                charts.HS_PSUM = new uPlot(opts_HS_PSUM, data_HS_PSUM, document.getElementById("plot_HS_PSUM"));
                charts.RH_GR = new uPlot(opts_RH_GR, data_RH_GR, document.getElementById("plot_RH_GR"));
            } catch (error) {
                console.error('Error initializing charts:', error);
            }
        }

        // Drag and Drop functionality
        let draggedElement = null;

        function setupDragAndDrop() {
            const plotWrappers = document.querySelectorAll('.plot-wrapper');
            
            plotWrappers.forEach(wrapper => {
                wrapper.addEventListener('dragstart', handleDragStart);
                wrapper.addEventListener('dragend', handleDragEnd);
                wrapper.addEventListener('dragover', handleDragOver);
                wrapper.addEventListener('drop', handleDrop);
                wrapper.addEventListener('dragenter', handleDragEnter);
                wrapper.addEventListener('dragleave', handleDragLeave);
            });
        }

        function handleDragStart(e) {
            draggedElement = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', this.outerHTML);
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            
            // Clean up any remaining drag-over classes
            document.querySelectorAll('.plot-wrapper').forEach(wrapper => {
                wrapper.classList.remove('drag-over');
            });
        }

        function handleDragOver(e) {
            if (e.preventDefault) {
                e.preventDefault();
            }
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleDragEnter(e) {
            if (this !== draggedElement) {
                this.classList.add('drag-over');
            }
        }

        function handleDragLeave(e) {
            this.classList.remove('drag-over');
        }

        function handleDrop(e) {
            if (e.stopPropagation) {
                e.stopPropagation();
            }

            if (draggedElement !== this) {
                // Get the container
                const container = document.getElementById('plot-container');
                const allWrappers = Array.from(container.querySelectorAll('.plot-wrapper'));
                
                // Find positions
                const draggedIndex = allWrappers.indexOf(draggedElement);
                const targetIndex = allWrappers.indexOf(this);
                
                // Reorder elements
                if (draggedIndex < targetIndex) {
                    // Moving down
                    container.insertBefore(draggedElement, this.nextSibling);
                } else {
                    // Moving up
                    container.insertBefore(draggedElement, this);
                }

                console.log('Charts reordered!');
            }

            this.classList.remove('drag-over');
            return false;
        }

        // Initialize everything when the page loads
       document.addEventListener('DOMContentLoaded', function () {
    initializeCharts();        // your chart initialization function
    setupDragAndDrop();        // your drag-and-drop setup

    // Subscribe each chart to cursor sync (if available)
    if (typeof syncCursor !== 'undefined') {
        if (charts.TA_TD_TSS) syncCursor.sub(charts.TA_TD_TSS);
        if (charts.VW_VWG_DW) syncCursor.sub(charts.VW_VWG_DW);
        if (charts.HS_PSUM) syncCursor.sub(charts.HS_PSUM);
        if (charts.RH_GR) syncCursor.sub(charts.RH_GR);
    }

    // Toggle shaded area in temperature chart
    const toggleBtn = document.getElementById('toggleBtn');
    if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
            showShadedAreas = !showShadedAreas;
            toggleBtn.textContent = showShadedAreas
                ? 'Oberflächenreif-Potential ausblenden'
                : 'Oberflächenreif-Potential einblenden';

            // Redraw 
            if (charts.TA_TD_TSS) {
                charts.TA_TD_TSS.redraw();
            }
        });
    }

    console.log('All charts initialized without resizing.');
});
    </script>
