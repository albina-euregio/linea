<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>linea</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      body {
        font-family: Helvetica, sans-serif;
        margin: 20px;
      }

      .controls {
        text-align: center;
      }

      .toggle-btn {
        padding: 10px 20px;
        background-color: #ffffff;
        color: #555555;
        border: 2px solid #19aaff;
        border-radius: 40px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 300;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;

        &:hover {
          background-color: #19aaff;
          color: white;
        }

        &:active {
          transform: translateY(1px);
        }
      }

      linea-plot,
      linea-plot-year {
        display: flex;
        flex-direction: column;
        gap: 20px;

        & > div:empty {
          display: none;
        }

        & > div {
          background-color: white;
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 10px;
        }
      }
    </style>
  </head>

  <body>
    <linea-plot data="" showsurfacehoarseries showtitle />
    <script type="module" src="https://albina-euregio.gitlab.io/linea/linea.js"></script>
  </body>
</html>
