<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>linea</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      html,
      body {
        height: 100%; /* <--- crucial */
        margin: 0;
      }

      #chart-container {
        position: relative;
        width: 100%;
        height: 100%; /* now 100% of body */
      }

      #linea {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      #fallback {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        z-index: 2;
      }
    </style>
  </head>
  BODY
</html>
