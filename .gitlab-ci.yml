---
build:
  image: node:24
  stage: build
  script:
    - corepack enable
    - pnpm install --frozen-lockfile
    - pnpm run ci
    - pnpm pack
  artifacts:
    paths:
      - demo.html
      - dist/
      - albina-euregio-linea*tgz
      - LICENSE
      - package.json
      - README.md

build:cli:
  image: node:25-alpine
  stage: build
  script:
    - npx pnpm@10.33.0 install --frozen-lockfile --ignore-scripts
    - npx pnpm@10.33.0 run build:cli
  artifacts:
    name: ${CI_PROJECT_NAME}-${CI_JOB_NAME_SLUG}-${CI_COMMIT_SHORT_SHA}
    paths:
      - dist/
      - LICENSE
      - package.json
      - README.md

publish-npm:
  stage: deploy
  image: node:24
  needs:
    - build
  script:
    - corepack enable
    - pnpm install --frozen-lockfile
    - npm config set -- "@${CI_PROJECT_ROOT_NAMESPACE}:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"
    - npm config set -- "${CI_API_V4_URL#https?}/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=\${CI_JOB_TOKEN}"
    - npm config set -- "${CI_API_V4_URL#https?}/groups/${CI_PROJECT_ROOT_NAMESPACE}/-/packages/npm/:_authToken=\${CI_JOB_TOKEN}"
    - npm version --no-git-tag-version $CI_COMMIT_TAG
    - npm publish
  only:
    - tags

pages:
  stage: deploy
  image: alpine:latest
  needs:
    - build
  pages:
    publish: dist
  script:
    - echo Deploying GitLab Pages
  only:
    - tags
