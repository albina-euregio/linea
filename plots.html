<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://leeoniya.github.io/uPlot/src/uPlot.css">
    <style>
        body {
            font-family: Helvetica, sans-serif;
            margin: 20px;
        }
        .controls {
            margin-bottom: 20px;
            text-align: center;
        }
        .toggle-btn {
        padding: 10px 20px;
        background-color: #ffffff;     
        color: #555555;                
        border: 2px solid #19aaff;     
        border-radius: 40px;
        cursor: pointer;
        font-size: 14px;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 300; 
        transition: background-color 0.3s ease, color 0.3s ease;
        }

        .toggle-btn:hover {
        background-color: #19aaff;     
        color: white;                  
        }
        .toggle-btn:active {
            transform: translateY(1px);
        }
        #plot-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
     #plot-container > div {
    background-color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px;          
}
    </style>
</head>
<body>
    <script src="https://leeoniya.github.io/uPlot/dist/uPlot.iife.js"></script>
    
    <div class="controls">
        <button id="toggleBtn" class="toggle-btn">Oberflächenreif-Potential ausblenden</button>
    </div>
    
    <!-- Plot Containers -->
    <div id="plot-container">
        <div id="plot_TA_TD_TSS"></div>
        <div id="plot_VW_VWG_DW"></div>
        <div id="plot_HS_PSUM"></div>
        <div id="plot_RH_GR"></div>
    </div>
    
    <script>
        const timestamp = [1727733600, 1727734200, 1727734800, 1727735400, 1727736000, 1727736600, 1727737200];
        const TA = [-14, -17, -12.8, -3.7, -12.8, -12.8, -12.8];
        const RH = [89, 90, 91, 92, 93, 94, 95];
        const TSS = [-0.8, -2.1, -15.4, -0.3, -15.2, -15.2, -15.1];
        const VW = [6.9, 6.5, 5.8, 5.1, 4.3, 3.5, 3.7];
        const VWG = [30, 29.9, null, 24.5, 18.7, 15.5];
        const DW = [186, 186, 180, 176, 180, 156, 119];
        const HS = [45, 44, 45, 46, 46, 45, 47];
        const PSUM = [1, 1.2, 0.1, 0.1, 0.2, 0.3, 0.2];
        const GR = [320, 320, 322, 340, 350, 351, 352];
        
        // Formula for TD (Magnus)
        const dewPoint = (tempC, RH) => {
            const a = 17.27;
            const b = 237.7;
            const alpha = ((a * tempC) / (b + tempC)) + Math.log(RH / 100);
            return (b * alpha) / (a - alpha);
        };
        
        // Calculate TD array
        const TD = TA.map((temp, i) => dewPoint(temp, RH[i]));
        
        // Create the data arrays for each chart
        let data_TA_TD_TSS = [timestamp, TA, TD, TSS];
        let data_VW_VWG_DW = [timestamp, VW, VWG, DW];
        let data_HS_PSUM = [timestamp, HS, PSUM];
        let data_RH_GR = [timestamp, RH, GR];
        
        // Create state variable to control shading
        let showShadedAreas = true;
        
        // Create a single sync instance for all charts
        const syncCursor = uPlot.sync("weather-charts");
        
        // Define shared cursor options for all charts
        const cursorOpts = {
            lock: false,
            focus: {
                prox: -1,
            },
            sync: {
                key: syncCursor.key,
                setSeries: false,
                match: [(own, ext) => own == ext, (own, ext) => own == ext]
            },
            points: {
                size: 5,
                width: 2
            },
            drag: {
                setScale: true,
                x: true,
                y: false,
                dist: 0,
                uni: null,
                click: (self, e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    e.stopImmediatePropagation();
                },
            },
            snap: true,
            showTime: true
        };
        
        // uPlot options for Temperature, Dew Point & Snow Surface Temperature
        const opts_TA_TD_TSS = {
            width: 1040,
            height: 300,
            padding: [50, 50, 0, 50],
            cursor: cursorOpts,
            legend: {
                show: true,
                live: true,
                fill: (u, seriesIdx) => u.series[seriesIdx].stroke(u, seriesIdx),
                markers: {
                    fill: (u, seriesIdx) => u.series[seriesIdx].stroke(u, seriesIdx),
                    values: (u, seriesIdx, values) => {
                        let result = {};
                        u.series.forEach((s, i) => {
                            if (i === 0) {
                                result[s.label || s.name] = values[i];
                            } else {
                                result[s.label] = values[i] + (s.unit ? ` ${s.unit}` : "");
                            }
                        });
                        return result;
                    }
                }
            },
            
            hooks: {
                drawAxes: [
                    (u) => {
                        const ctx = u.ctx;
                        ctx.save();
                        ctx.font = "bold 0.9vm sans-serif";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "bottom";
                        
                        const plotWidth = u.bbox.width;
                        const canvasWidth = u.ctx.canvas.width;
                        const canvasHeight = u.ctx.canvas.height;
                        const yPos = canvasHeight * 0.05;

                        
                        // Horizontal label for y-axis
                        const xPosY = canvasWidth * 0.10;
                        ctx.fillStyle = "#DE2D26";
                        ctx.fillText("Temperatur (°C)", xPosY, yPos);
                        
                        // Horizontal label for y2-axis
                        const xPosY2 = canvasWidth * 0.9;
                        ctx.fillStyle = "#6aafd5";
                        ctx.fillText("Taupunkt (°C)", xPosY2, yPos);
                        
                        // Draw reference line at 0°C
                        const width = 1;
                        const offset = (width % 2) / 2;
                        const x0 = u.bbox.left;
                        const y0 = u.valToPos(0, "y", true);
                        const x1 = u.bbox.left + u.bbox.width;
                        
                        ctx.strokeStyle = "#000";
                        ctx.setLineDash([5, 5]);
                        ctx.lineWidth = width;
                        ctx.beginPath();
                        ctx.moveTo(x0 + offset, y0 + offset);
                        ctx.lineTo(x1 + offset, y0 + offset);
                        ctx.stroke();
                        ctx.setLineDash([]);
                        
                        ctx.restore();
                        
                        // Only draw shaded regions if showShadedAreas is true
                        if (showShadedAreas) {
                            ctx.save();
                            ctx.rect(u.bbox.left, u.bbox.top, u.bbox.width, u.bbox.height);
                            ctx.clip();
                            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
                            
                            let from = 0, to = 0;
                            
                            for (let i = 0; i < u.data[0].length; i++) {
                                let td = u.data[2][i];
                                let tss = u.data[3][i];
                                
                                if (td < 0 && tss < td) {
                                    let xVal = u.data[0][i];
                                    if (from === 0) from = xVal;
                                    to = xVal;
                                } else if (from !== 0) {
                                    let x0 = u.valToPos(from, "x", true);
                                    let x1 = u.valToPos(to, "x", true);
                                    ctx.fillRect(x0, u.bbox.top, x1 - x0, u.bbox.height);
                                    from = 0;
                                }
                            }
                            
                            // If region extends to end
                            if (from !== 0) {
                                let x0 = u.valToPos(from, "x", true);
                                let x1 = u.valToPos(to, "x", true);
                                ctx.fillRect(x0, u.bbox.top, x1 - x0, u.bbox.height);
                            }
                            
                            ctx.restore();
                        }
                    }
                ]
            },
            
scales: {
  y: {
    range: (u, dataMin, dataMax) => {
      return (dataMin < -35 || dataMax > 15) ? [-40, 30] : [-35, 15];
    }
  },
  y2: {
    range: (u, dataMin, dataMax) => {
      return (dataMin < -35 || dataMax > 15) ? [-40, 30] : [-35, 15];
    }
  }
},

    },

      return (min <= -40 && max >= 30) 
        ? [-40, -30, -20, -10, 0, 10, 20, 30]
        : [-35, -30, -20, -10, 0, 10, 15];
    },
     values: (u, splits) => {
      const min = u.scales.y.min;
      const max = u.scales.y.max;
      return (min <= -40 && max >= 30) 
        ? ["", "-30", "-20", "-10", "0", "10", "20", ""] 
        : ["", "-30", "-20", "-10", "0", "10", ""];
    }
  }
],

                    scale: "y",
                    width: 2,
                    value: (u, v) => v != null ? v.toFixed(1) + " °C" : "-"
                },
            ],
        };
        
       // uplot options for Windgeschwindigkeit [km/h] & Windrichtung [˚]
    const opts_VW_VWG_DW = {
      width: 1040,
      height: 300,
      padding: [50,50,0,50],
      cursor: cursorOpts,
      legend: {
        show: true,

        markers: {

      hooks: {
  drawAxes: [
    (u) => {
      const ctx = u.ctx;
      ctx.save();
      ctx.font = "bold 0.9vm sans-serif";      
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";

      const canvasWidth = u.ctx.canvas.width;
      const canvasHeight = u.ctx.canvas.height;

      // horizontal label for y-axis
      const xPosY = canvasWidth * 0.075;
      ctx.fillStyle = "#00E2B6";
      ctx.fillText("km/h", xPosY, yPos);

      // horizontal label for y2-axis
      const xPosY2 = canvasWidth * 0.9;

      // Draw reference line at 25 km/h (working group decision)
      const width = 1;

      const x0 = u.bbox.left;
      const y0 = u.valToPos(25, "y", true);
      const x1 = u.bbox.left + u.bbox.width;

      ctx.strokeStyle = "#000";
      ctx.setLineDash([5, 5]);
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(x0 + offset, y0 + offset);
      ctx.lineTo(x1 + offset, y0 + offset);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.restore();

    }
  ]
},
      scales: {

    range: (u, dataMin, dataMax) => {
      return (dataMin < 0 || dataMax > 100) ? [0, 120] : [0, 100];
    }
  },
        y2: {
          range: [0, 360],
        }
      },
      axes: [
        {

           [31536000, "{YYYY}", null, null, null, null, null, null, 1],
      [2419200, "{MMM}", "\n{YYYY}", null, null, null, null, null, 1], // Shows month as Jan, Feb, May, etc.
      [86400, "{DD}. {MMM}", "\n{YYYY}", null, null, null, null, null, 1], // e.g. 29. May
      [3600, "{HH}:{mm}", "\n{DD}. {MMM} {YY}", null, "\n{DD}. {MMM}", null, null, null, 1],
      [60, "{HH}:{mm}", "\n{DD}. {MMM} {YY}", null, "\n{DD}. {MMM}", null, null, null, 1],
      [1, ":{ss}", "\n{DD}. {MMM} {YY} {HH}:{mm}", null, "\n{DD}. {MMM} {HH}:{mm}", null, "\n{HHh}:{mm}", null, 1],
          ],
          grid: {

          }
        },
        {

      const min = u.scales.y.min;

      return (min <= 0 && max >= 120)

    },
          stroke: "#00E2B6",
          scale: 'y',

        {

          scale: 'y2',

      ],
      series: [
         {

         },
        {

          value: (u, v) => v != null ? v.toFixed(1) + " km/h" : "-"
        },
        {

          stroke: "#00A484",
          scale: "y",
          width: 2,
          value: (u, v) => v != null ? v.toFixed(1) + " km/h" : "-"
        },
        {

          },
          scale: "y2",
          value: (u, v) => v != null ? v.toFixed(1) + "°" : "-"
        },
      ]
    };

    // uplot options for Schneehöhe [cm] & Niederschlag 24h [mm]	
    const opts_HS_PSUM = {
      width: 1040,
      height: 300,
      padding: [50,50,0,50],
      cursor: cursorOpts,
      legend: {
        show: true,
        live: true,

        markers: {

      },
      hooks: {

      const ctx = u.ctx;

     const canvasWidth = u.ctx.canvas.width;

      // horizontal label for y-axis
      const xPosY = canvasWidth * 0.10;

      // horizontal label for y2-axis

},

         },

            hooks: {

            toggleBtn.textContent = showShadedAreas ? 'Oberflächenreif-Potential ausblenden' : 'Oberflächenreif-Potential einblenden';
            // Only redraw the temperature chart since that's the only one with shading
            uplot1.redraw();
        });
        
        // Handle window resize for all charts
        window.addEventListener('resize', () => {
            const newWidth = Math.min(1040, window.innerWidth - 60);
            uplot1.setSize({ width: newWidth, height: 300 });
            uplot2.setSize({ width: newWidth, height: 300 });
            uplot3.setSize({ width: newWidth, height: 300 });
            uplot4.setSize({ width: newWidth, height: 300 });
        });
        
    </script>
</body>
</html>
